spring:
  application:
    name: team2pairing

  datasource:
    url: jdbc:postgresql://localhost:5446/team2pairing
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
