version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: team2pairing-db
    environment:
      POSTGRES_DB: team2pairing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5446:5432"
    volumes:
      - team2pairing_data:/var/lib/postgresql/data

volumes:
  team2pairing_data: